name: PR Title

# Enforce Conventional Commits at the PR title level, not commit-by-commit.
# The PR title becomes the squash-merge commit message on main, which release-please
# consumes for changelog + version bumping. Individual PR commits can be anything
# (CodeRabbit autofix, "wip", review fixups) since they're squashed away.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]
    branches: [main]

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
            deps
            revert
            hotfix
            patch
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title subject must start with a lowercase letter.
          validateSingleCommit: false
          headerPattern: '^(\w+)(?:\(([\w$.\-*/ ]*)\))?: (.+)$'
          headerPatternCorrespondence: type, scope, subject
