# CI/CD Pipeline - Pluto Betting Bot
# Builds, verifies, and deploys Docker images to GHCR
#
# Deploy triggers: release event | workflow_dispatch (force_build)
# Skip CI: Use native [skip ci] in commit message

name: CI/CD Pipeline

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: "Run the Docker deploy job manually"
        type: boolean
        default: false
      dry_run:
        description: "Build and load the Docker image without pushing it"
        type: boolean
        default: false
      version_override:
        description: "Override version (e.g., 1.0.0-rc.1)"
        type: string
        required: false

  pull_request:
    branches: [main, dev/parlays-props]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "dev/**"

  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: pluto-betting-bot
  IMAGE_TITLE: Pluto Betting Bot
  IMAGE_DESCRIPTION: "Sports Betting Application for Discord"
  IMAGE_VENDOR: fearandesire

permissions:
  contents: read
  pull-requests: read

jobs:
  # ===========================================================================
  # VERIFY - Build validation and commit linting
  # ===========================================================================
  verify:
    name: Verify
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test with required Redis contract
        run: pnpm test:run
        env:
          PLUTO_REQUIRE_REDIS_TESTS: "1"
          PLUTO_TEST_REDIS_URL: redis://localhost:6379/15

      - name: Build
        run: pnpm build

      - name: Verify production dist
        run: pnpm verify:dist

      - name: Build production image for packaging smoke
        run: |
          mkdir -p assets
          docker build \
            --target production \
            --tag "pluto-production-smoke:${GITHUB_SHA}" \
            .

      - name: Verify production image packaging
        run: |
          docker run --rm \
            --entrypoint /bin/sh \
            "pluto-production-smoke:${GITHUB_SHA}" \
            -c '
              set -eu
              test -f /app/dist/index.js

              leaked="$(find /app/dist -type f \( \
                -path "*/__tests__/*" \
                -o -name "*.test.*" \
                -o -name "*.spec.*" \
              \) -print)"

              if [ -n "$leaked" ]; then
                printf "Compiled test artifacts found in production image:\n%s\n" "$leaked" >&2
                exit 1
              fi

              if node --input-type=module \
                -e "await import(\"vitest\")" >/dev/null 2>&1
              then
                echo "vitest is importable in the production image" >&2
                exit 1
              fi
            '

  # ===========================================================================
  # DEPLOY - Build and push Docker image to GHCR
  # Triggers: release event (release-please) | workflow_dispatch with force_build
  # ===========================================================================
  deploy:
    name: Deploy
    needs: verify
    runs-on: ubuntu-latest
    if: >-
      needs.verify.result == 'success' && (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && inputs.force_build)
      )

    permissions:
      contents: read
      attestations: write
      id-token: write
      # Required so GITHUB_TOKEN can push the image to GHCR (replaces the
      # package-push scope that previously came from PLUTO_BOT_PAT). This ALSO
      # requires the pluto-betting-bot GHCR package to grant this repo's Actions
      # write access (human prereq H3) — otherwise the push 403s.
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      image_tag: ${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          set -euo pipefail
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          # 1. Manual override from workflow_dispatch
          VERSION="${{ inputs.version_override }}"

          # 2. package.json (primary source)
          if [[ -z "$VERSION" ]]; then
            VERSION=$(jq -r '.version' package.json)
            echo "📦 Version source: package.json"
          else
            echo "📦 Version source: manual override"
          fi

          # 3. Fallback (should never happen)
          VERSION="${VERSION:-0.0.0}"
          # Release events run on the tag ref (refs/tags/vX.Y.Z), not
          # refs/heads/main — without the release clause, release deploys
          # never move :latest and Watchtower on the VPS never updates.
          ENABLE_LATEST="${{ github.ref == 'refs/heads/main' || github.event_name == 'release' }}"

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "enable_latest=$ENABLE_LATEST" >> $GITHUB_OUTPUT
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📦 Version:   $VERSION"
          echo "🔖 Short SHA: $SHORT_SHA"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Hydrate assets from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
        run: |
          set -euo pipefail
          aws s3 cp s3://pluto-assets/matchupimages.tar.gz /tmp/matchupimages.tar.gz \
            --endpoint-url="$R2_ENDPOINT"
          mkdir -p assets
          tar -xzf /tmp/matchupimages.tar.gz -C assets/
          rm /tmp/matchupimages.tar.gz
          echo "Hydrated $(find assets/matchupimages -type f | wc -l) asset files"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          # GITHUB_TOKEN (with packages: write above) replaces PLUTO_BOT_PAT.
          # REQUIRES the pluto-betting-bot GHCR package to have granted this
          # repo's Actions write access (human prereq H3).
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: |
          echo "IMAGE_NAME=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Resolve deploy mode
        id: deploy_mode
        run: |
          set -euo pipefail
          DRY_RUN="${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}"

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_run=true" >> "$GITHUB_OUTPUT"
            echo "push=false" >> "$GITHUB_OUTPUT"
            echo "load=true" >> "$GITHUB_OUTPUT"
            echo "mode=Dry run (build only)" >> "$GITHUB_OUTPUT"
          else
            echo "dry_run=false" >> "$GITHUB_OUTPUT"
            echo "push=true" >> "$GITHUB_OUTPUT"
            echo "load=false" >> "$GITHUB_OUTPUT"
            echo "mode=Publish" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.short_sha }}
            type=raw,value=latest,enable=${{ steps.version.outputs.enable_latest }}
          labels: |
            org.opencontainers.image.title=${{ env.IMAGE_TITLE }}
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}
            org.opencontainers.image.vendor=${{ env.IMAGE_VENDOR }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.deploy_mode.outputs.push }}
          load: ${{ steps.deploy_mode.outputs.load }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ steps.deploy_mode.outputs.push }}
          sbom: ${{ steps.deploy_mode.outputs.push }}

      - name: Inspect dry-run image
        if: steps.deploy_mode.outputs.dry_run == 'true'
        run: |
          docker image inspect \
            "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}" \
            --format='Loaded image {{ .Id }} with {{ len .RootFS.Layers }} layers'

      - name: Create deployment summary
        run: |
          IMMUTABLE_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}"
          IMAGE_DIGEST="${{ steps.build.outputs.digest }}"
          DIGEST_IMAGE=""

          if [[ -n "$IMAGE_DIGEST" ]]; then
            DIGEST_IMAGE="${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}@$IMAGE_DIGEST"
          fi

          if [[ "${{ steps.deploy_mode.outputs.dry_run }}" == "true" ]]; then
            PUBLISH_NOTE="Dry run: image was built and loaded on the runner, but no GHCR push was performed."
            QUICK_PULL="Not available from this dry-run build."
            TAGS_HEADING="Built Tags"
          else
            PUBLISH_NOTE="Image was pushed to GHCR."
            QUICK_PULL="docker pull $IMMUTABLE_IMAGE"
            TAGS_HEADING="Published Tags"
          fi

          {
            echo "## 🚀 Deployment Summary"
            echo
            echo "### Image Details"
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| **Registry** | \`${{ env.REGISTRY }}\` |"
            echo "| **Image** | \`${{ github.repository_owner }}/${{ env.IMAGE_NAME }}\` |"
            echo "| **Version** | \`${{ steps.version.outputs.version }}\` |"
            echo "| **Commit** | \`${{ steps.version.outputs.short_sha }}\` |"
            echo "| **Mode** | \`${{ steps.deploy_mode.outputs.mode }}\` |"
            echo "| **Pushed** | \`${{ steps.deploy_mode.outputs.push }}\` |"
            echo "| **Deploy / Rollback Tag** | \`$IMMUTABLE_IMAGE\` |"
            if [[ -n "$DIGEST_IMAGE" ]]; then
              echo "| **Image Digest** | \`$DIGEST_IMAGE\` |"
            fi
            echo
            echo "$PUBLISH_NOTE"
            echo "Use the deploy / rollback tag, or the digest when available, for production rollbacks. Treat latest as a convenience pointer only."
            echo
            echo "### $TAGS_HEADING"
            echo '```'
            if [[ "${{ steps.version.outputs.enable_latest }}" == "true" ]]; then
              echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"
            fi
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.short_sha }}"
            echo "${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}"
            echo '```'
            echo
            echo "### Quick Pull"
            echo '```bash'
            echo "$QUICK_PULL"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # Discord C3: green embed when the image was actually pushed to GHCR
      # (skips dry runs). Skipped silently if the webhook secret is not set.
      - name: Notify Discord — image pushed
        if: steps.deploy_mode.outputs.push == 'true'
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK" ]]; then
            echo "::notice::DISCORD_CICD_WEBHOOK not set — skipping notification"
            exit 0
          fi
          payload=$(jq -n \
            --arg version "$VERSION" \
            --arg imagetag "$IMAGE_TAG" \
            --arg runurl "$RUN_URL" \
            '{embeds:[{title:"🟢 Pluto image pushed to GHCR",
              description:"Deploy built and pushed a new image.",
              color:3066993,fields:[
               {name:"Service",value:"Pluto",inline:true},
               {name:"Stage",value:"Deploy",inline:true},
               {name:"Version",value:$version,inline:true},
               {name:"Image tag",value:("`" + $imagetag + "`"),inline:false},
               {name:"Run",value:$runurl,inline:false}
             ]}]}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"

      - name: Notify Discord — failure
        if: failure()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CICD_WEBHOOK }}
          VERSION: ${{ steps.version.outputs.version }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [[ -z "$DISCORD_WEBHOOK" ]]; then
            echo "::notice::DISCORD_CICD_WEBHOOK not set — skipping notification"
            exit 0
          fi
          # Version step may not have run if the job failed early; default it so
          # the embed field is never empty (an empty value is a Discord 400).
          VERSION="${VERSION:-unknown}"
          payload=$(jq -n \
            --arg version "$VERSION" \
            --arg runurl "$RUN_URL" \
            '{embeds:[{title:"🔴 Pluto deploy failed",
              description:"The Deploy job errored before pushing the image.",
              color:15158332,fields:[
               {name:"Service",value:"Pluto",inline:true},
               {name:"Stage",value:"Deploy",inline:true},
               {name:"Version",value:$version,inline:true},
               {name:"Run",value:$runurl,inline:false}
             ]}]}')
          curl -sf -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK"
